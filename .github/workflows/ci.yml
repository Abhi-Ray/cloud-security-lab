name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e '.[dev]'
      - name: Lint with ruff
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e '.[dev]'
      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=xml --cov-report=term-missing -v
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e '.[dev]'
      - name: Run Bandit security scan
        run: bandit -r src/ -f json -o bandit-report.json || true
      - name: Display Bandit results
        run: bandit -r src/ -f screen || true
      - name: Audit dependencies
        run: pip-audit
      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5.0'
      - name: Terraform Format Check
        run: |
          for dir in infra/aws/s3_secure_bucket infra/aws/iam_baseline infra/aws/cloudtrail infra/azure/nsg_baseline; do
            echo "Checking $dir..."
            terraform -chdir=$dir fmt -check -recursive
          done
      - name: Terraform Validate
        run: |
          for dir in infra/aws/s3_secure_bucket infra/aws/iam_baseline infra/aws/cloudtrail infra/azure/nsg_baseline; do
            echo "Validating $dir..."
            terraform -chdir=$dir init -backend=false
            terraform -chdir=$dir validate
          done
