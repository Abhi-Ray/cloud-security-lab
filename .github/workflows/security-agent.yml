name: Security Lab Agent
on:
  schedule:
    - cron: '42 3 * * 1'    # Monday 03:42 UTC
    - cron: '15 7 * * 3'    # Wednesday 07:15 UTC
    - cron: '30 14 * * 5'   # Friday 14:30 UTC
    - cron: '0 10 * * 6'    # Saturday 10:00 UTC
  workflow_dispatch:
    inputs:
      task_override:
        description: 'Override the AI agent task selection'
        required: false
        type: string

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Random delay to avoid detection patterns
        run: |
          DELAY=$((RANDOM % 1800))
          echo "Sleeping for ${DELAY} seconds to randomize execution time"
          sleep $DELAY

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Configure git
        run: |
          git config user.name "cloud-security-bot"
          git config user.email "bot@cloud-security-lab.dev"

      - name: Run AI Security Agent
        run: python -m automation.ai_agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TASK_OVERRIDE: ${{ github.event.inputs.task_override }}

      - name: Push changes if any
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            BRANCH="agent/$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git add -A
            git commit -m "feat(agent): automated security enhancement

            Generated by Cloud Security Lab AI Agent
            Run ID: ${{ github.run_id }}"
            git push origin "$BRANCH"
            echo "Changes pushed to branch: $BRANCH"
          else
            echo "No changes to commit"
          fi
