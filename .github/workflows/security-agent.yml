name: Security Lab Agent
on:
  schedule:
    - cron: '42 3 * * 1'    # Monday 03:42 UTC
    - cron: '27 11 * * 2'   # Tuesday 11:27 UTC
    - cron: '15 7 * * 3'    # Wednesday 07:15 UTC
    - cron: '53 16 * * 4'   # Thursday 16:53 UTC
    - cron: '30 14 * * 5'   # Friday 14:30 UTC
  workflow_dispatch:
    inputs:
      task_override:
        description: 'Override the AI agent task selection'
        required: false
        type: string

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Random delay to avoid detection patterns
        run: |
          DELAY=$((RANDOM % 300))
          echo "Sleeping for ${DELAY} seconds to randomize execution time"
          sleep $DELAY

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Configure git
        run: |
          git config user.name "cloud-security-bot"
          git config user.email "bot@cloud-security-lab.dev"

      - name: Record initial SHA
        run: echo "BEFORE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Run AI Security Agent
        run: python -m automation.ai_agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TASK_OVERRIDE: ${{ github.event.inputs.task_override }}

      - name: Push changes if any
        id: push
        run: |
          AFTER_SHA=$(git rev-parse HEAD)
          BRANCH="agent/$(date +%Y%m%d-%H%M%S)"

          if [ "$AFTER_SHA" != "$BEFORE_SHA" ]; then
            git checkout -b "$BRANCH"
            git push origin "$BRANCH"
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
            echo "pushed=true" >> "$GITHUB_OUTPUT"
            echo "Pushed agent commit to branch: $BRANCH"
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to push (agent did not commit)"
          fi

      - name: Create Pull Request
        if: steps.push.outputs.pushed == 'true'
        id: pr
        run: |
          BRANCH="${{ steps.push.outputs.branch }}"
          PR_URL=$(gh pr create \
            --head "$BRANCH" \
            --base main \
            --title "feat(agent): automated security enhancement $(date +%Y-%m-%d)" \
            --body "Automated improvement generated by Cloud Security Lab AI Agent.

            - Run ID: ${{ github.run_id }}
            - Branch: \`$BRANCH\`
            - Model: ${{ secrets.OPENROUTER_MODEL }}" \
          )
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "Created PR: $PR_URL"
        env:
          GH_TOKEN: ${{ secrets.AGENT_PAT }}

      - name: Wait for CI and Merge
        if: steps.pr.outputs.pr_url != ''
        run: |
          PR_URL="${{ steps.pr.outputs.pr_url }}"
          PR_NUM=$(basename "$PR_URL")
          echo "Waiting for CI checks on PR #$PR_NUM..."

          # Wait up to 10 minutes for checks to complete
          TIMEOUT=600
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            # gh pr checks --json state returns uppercase: SUCCESS, FAILURE, SKIPPED, etc.
            STATUS=$(gh pr checks "$PR_NUM" --json state --jq '[.[].state] | all(. == "SUCCESS" or . == "SKIPPED" or . == "NEUTRAL")' 2>/dev/null || echo "false")
            FAILED=$(gh pr checks "$PR_NUM" --json state --jq '[.[].state] | any(. == "FAILURE" or . == "TIMED_OUT" or . == "CANCELLED" or . == "ACTION_REQUIRED")' 2>/dev/null || echo "false")

            if [ "$FAILED" = "true" ]; then
              echo "CI checks failed — not merging"
              exit 0
            fi

            if [ "$STATUS" = "true" ]; then
              echo "All CI checks passed — merging"
              gh pr merge "$PR_NUM" --squash
              echo "Merged PR #$PR_NUM"
              exit 0
            fi

            sleep 15
            ELAPSED=$((ELAPSED + 15))
            echo "Waiting... (${ELAPSED}s elapsed)"
          done

          echo "Timeout waiting for CI — not merging"
        env:
          GH_TOKEN: ${{ secrets.AGENT_PAT }}
