name: Security Lab Agent
on:
  schedule:
    - cron: '42 3 * * 1'    # Monday 03:42 UTC
    - cron: '27 11 * * 2'   # Tuesday 11:27 UTC
    - cron: '15 7 * * 3'    # Wednesday 07:15 UTC
    - cron: '53 16 * * 4'   # Thursday 16:53 UTC
    - cron: '30 14 * * 5'   # Friday 14:30 UTC
  workflow_dispatch:
    inputs:
      task_override:
        description: 'Override the AI agent task selection'
        required: false
        type: string

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Random delay to avoid detection patterns
        run: |
          DELAY=$((RANDOM % 1800))
          echo "Sleeping for ${DELAY} seconds to randomize execution time"
          sleep $DELAY

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Configure git
        run: |
          git config user.name "cloud-security-bot"
          git config user.email "bot@cloud-security-lab.dev"

      - name: Record initial SHA
        run: echo "BEFORE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Run AI Security Agent
        run: python -m automation.ai_agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TASK_OVERRIDE: ${{ github.event.inputs.task_override }}

      - name: Push changes if any
        run: |
          AFTER_SHA=$(git rev-parse HEAD)
          BRANCH="agent/$(date +%Y%m%d-%H%M%S)"

          if [ "$AFTER_SHA" != "$BEFORE_SHA" ]; then
            # Agent committed locally — push that commit to a new branch
            git checkout -b "$BRANCH"
            git push origin "$BRANCH"
            echo "Pushed agent commit to branch: $BRANCH"
          elif [ -n "$(git status --porcelain)" ]; then
            # Uncommitted changes exist (agent created files but did not commit)
            git checkout -b "$BRANCH"
            git add -A
            git commit -m "feat(agent): automated security enhancement

            Generated by Cloud Security Lab AI Agent
            Run ID: ${{ github.run_id }}"
            git push origin "$BRANCH"
            echo "Pushed uncommitted changes to branch: $BRANCH"
          else
            echo "No changes to push"
          fi
